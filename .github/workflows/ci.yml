name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run plugin rule tests
        working-directory: sonarqube-java-rules
        run: mvn -q test

      - name: Package SonarQube plugin
        working-directory: sonarqube-java-rules
        run: mvn -q -DskipTests package

      - name: Compile sample analysis target
        working-directory: sonarqube-rule-test
        run: mvn -q test

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-java-rules-plugin
          path: sonarqube-java-rules/target/sonarqube-java-rules-1.0-SNAPSHOT.jar
